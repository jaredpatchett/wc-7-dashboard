<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b1a0e">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b1a0e'/%3E%3Ctext x='50' y='62' font-size='36' font-weight='800' fill='%23e8aa20' text-anchor='middle' font-family='Arial'%3EWC7%3C/text%3E%3C/svg%3E">
<title>WC7 v4.0 - World Cup 2026 Model</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1a0e;--card:#0f2012;--card2:#142918;--card3:#192e1c;
  --bord:#243a28;--bord2:#3a5a3e;
  --gold:#e8aa20;--gold2:#ffd060;
  --blue:#4a9fff;--teal:#00d4a0;
  --green:#3dba5f;--red:#f04060;--amber:#ffaa40;
  --txt:#e0f0e4;--txt2:#9abca0;--txt3:#5a8a60;
  --mono:'JetBrains Mono',monospace;
  --body:'Barlow Condensed',sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--body);font-size:15px;min-height:100vh}
.mono{font-family:var(--mono)}.muted{color:var(--txt3)}
.r{text-align:right}
.nav{background:#080f0a;border-bottom:2px solid var(--bord2);display:flex;align-items:stretch;padding:0 24px}
.nav-tab{display:flex;align-items:center;gap:8px;padding:14px 22px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.nav-tab:hover{border-bottom-color:var(--bord2)}
.nav-tab.on{border-bottom-color:var(--gold)}
.nav-num{font-family:var(--mono);font-size:10px;color:var(--txt3)}
.nav-tab.on .nav-num{color:var(--gold)}
.nav-label{font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3)}
.nav-tab.on .nav-label{color:var(--txt)}
.nav-brand{margin-left:auto;display:flex;align-items:center;gap:8px}
.brand-badge{background:var(--gold);color:#000;font-size:13px;font-weight:800;letter-spacing:2px;padding:3px 8px;border-radius:2px}
.brand-name{font-size:12px;color:var(--txt3)}
.sec{display:none}.sec.on{display:block}
.sel-bar{background:var(--card);border-bottom:1px solid var(--bord);padding:12px 24px;display:grid;grid-template-columns:1fr 48px 1fr;gap:10px;align-items:end}
.sel-grp{display:flex;flex-direction:column;gap:4px}
.sel-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);font-weight:600}
.sel-grp select{background:#060e08;border:1px solid var(--bord2);border-radius:3px;color:var(--txt);font-family:var(--body);font-size:17px;font-weight:600;padding:10px 12px;outline:none;width:100%}
.sel-grp select:focus{border-color:var(--gold)}
.vs-lbl{text-align:center;font-size:18px;font-weight:800;color:var(--txt3);letter-spacing:2px;padding-bottom:11px}
.mc{background:var(--card);border:1px solid var(--bord);margin:12px;border-radius:4px;overflow:hidden}
.mhead{background:linear-gradient(180deg,#0e200f,#0b1a0e);padding:24px 20px 0;display:grid;grid-template-columns:1fr auto 1fr;gap:10px}
.tside{display:flex;flex-direction:column;align-items:center;gap:6px;padding-bottom:18px}
.tflag{font-size:54px;line-height:1.1}
.tname{font-size:26px;font-weight:800;letter-spacing:1px;text-align:center}
.txg{font-size:13px;color:var(--txt3)}
.txg strong{color:var(--txt)}
.mle-tag{font-size:9px;color:var(--txt3);font-family:var(--mono);margin-top:3px}
.warn{font-size:10px;background:#1e1000;border:1px solid #3a2000;color:var(--amber);padding:3px 8px;border-radius:2px;margin-top:5px;text-align:center;line-height:1.4;max-width:170px}
.conc-badge{font-size:9px;background:#1e0a00;border:1px solid;padding:3px 8px;border-radius:2px;margin-top:5px;text-align:center;line-height:1.4;max-width:180px;font-family:var(--mono)}
.mcenter{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px 18px}
.sc-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:600}
.sc-nums{display:flex;align-items:center;gap:8px}
.sc-n{font-size:62px;font-weight:800;line-height:1}
.sc-dash{font-size:42px;color:var(--txt3);font-weight:300}
.adv{margin-top:8px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3)}
.prob-sec{padding:0 20px 16px;border-bottom:1px solid var(--bord)}
.pbar{height:36px;display:flex;border-radius:2px;overflow:hidden;gap:2px;margin-bottom:5px}
.pb{display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.pb-h{background:#c8901a;color:#1a1000}.pb-d{background:#b8bab8;color:#222}.pb-a{background:#3a80e0;color:#fff}
.plbls{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px}
.stats-sec{padding:14px 20px;border-bottom:1px solid var(--bord);background:var(--card2)}
.stats-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px;font-weight:600}
.stat-row{margin-bottom:12px}.stat-row:last-of-type{margin-bottom:0}
.stat-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.sn{font-size:22px;font-weight:800;color:var(--gold2)}.sn.a{color:var(--blue)}
.slbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3)}
.sbar{height:8px;background:#060e08;border-radius:4px;overflow:hidden;display:flex;gap:1px}
.sh2{height:100%;background:var(--gold)}.sa2{height:100%;background:var(--blue)}
.proj-note{font-size:10px;color:var(--txt3);font-style:italic;margin-top:10px;padding:7px 10px;background:#0a1a10;border-radius:2px;border:1px solid var(--bord)}
.odds-hdr,.vf-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);padding:10px 20px 8px;background:var(--card3);border-top:1px solid var(--bord);border-bottom:1px solid var(--bord);font-weight:600}
.otbl{width:100%;border-collapse:collapse}
.otbl th{padding:7px 16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);background:var(--card3);border-bottom:1px solid var(--bord);text-align:left;font-family:var(--mono)}
.otbl th.r{text-align:right}
.otbl td{padding:9px 16px;font-size:13px;border-bottom:1px solid #0f2012}
.otbl tr.sep td{background:var(--bord);height:3px;padding:0}
.otbl td.mkt{color:var(--txt2);font-weight:600}
.otbl td.out{font-weight:700;font-size:14px}
.otbl td.pct{font-family:var(--mono);font-size:12px}
.otbl td.fo{font-family:var(--mono);font-size:12px;text-align:right;font-weight:600}
.fo-pos{color:var(--gold)}.fo-neg{color:var(--txt2)}
.otbl-note,.vf-note{font-size:10px;color:var(--txt3);padding:8px 20px;background:var(--card)}
.vf-inputs-wrap{padding:12px 20px 0}
.vf-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--bord);border-radius:3px;overflow:hidden}
.vfi{display:flex;flex-direction:column}
.vfi:not(:last-child){border-right:1px solid var(--bord)}
.vfi label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);padding:7px 12px 3px;background:var(--card3);font-weight:600}
.vfi input{background:transparent;border:none;border-top:1px solid var(--bord);color:var(--txt);font-family:var(--mono);font-size:20px;padding:10px 12px;text-align:center;outline:none;width:100%}
.vfi input:focus{background:#0a180c}
.vfi.h input{color:var(--gold2)}.vfi.a input{color:var(--blue)}
.vtbl{width:100%;border-collapse:collapse;margin-top:12px}
.vtbl th{padding:6px 16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--bord);text-align:left;font-family:var(--mono)}
.vtbl th.r{text-align:right}
.vtbl td{padding:9px 16px;font-family:var(--mono);font-size:12px;border-bottom:1px solid #0f2012}
.vtbl td:first-child{font-family:var(--body);font-size:14px;font-weight:700}
.ev-pos{color:var(--green);font-weight:700}.ev-neg{color:var(--red)}
.edge-pos{color:var(--green)}.edge-neg{color:var(--red)}
.sig-b{background:#081808;color:var(--green);border:1px solid #1a5a1a;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:700}
.sig-e{background:#1a1000;color:var(--amber);border:1px solid #4a2800;padding:2px 8px;border-radius:2px;font-size:11px}
.sig-s{color:var(--txt3);font-size:11px}
.sig-f{background:#180608;color:var(--red);border:1px solid #4a1010;padding:2px 8px;border-radius:2px;font-size:11px}
.tier-elite{background:#081808;color:var(--green);border:1px solid #1a5a1a;padding:3px 9px;border-radius:3px;font-size:10.5px;font-weight:700;letter-spacing:.2px}
.tier-strong{background:#0a1420;color:var(--blue);border:1px solid #1a3a5a;padding:3px 9px;border-radius:3px;font-size:10.5px;font-weight:700;letter-spacing:.2px}
.tier-lean{background:#1a1000;color:var(--amber);border:1px solid #4a2800;padding:3px 9px;border-radius:3px;font-size:10.5px;font-weight:600;letter-spacing:.2px}
.tier-watch{background:#14100a;color:#c99a4a;border:1px solid #3a2a10;padding:3px 9px;border-radius:3px;font-size:10.5px;font-weight:600;letter-spacing:.2px}
.tier-nobet{background:#0f0f0f;color:var(--txt3);border:1px solid #2a2a2a;padding:3px 9px;border-radius:3px;font-size:10.5px;font-weight:500;letter-spacing:.2px}
.tier-cell{cursor:help}
.vf-margin{font-size:11px;color:var(--txt2);padding:6px 20px;font-family:var(--mono)}
.bottom{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--bord)}
.grid-sec{padding:14px 16px;background:var(--card2);border-right:1px solid var(--bord)}
.adv-sec{padding:14px 16px;background:var(--card2)}
.sec2-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:10px;font-weight:600}
.gtbl{border-collapse:collapse;font-size:11px}
.gtbl td,.gtbl th{width:38px;height:30px;text-align:center;border:1px solid #0f2012;font-family:var(--mono)}
.gtbl th{font-size:11px;font-weight:700;color:var(--txt3);background:var(--card3);border-color:var(--bord)}
.gh{background:#1e1000!important;color:var(--gold)!important}
.ga{background:#001030!important;color:var(--blue)!important}
.grid-note{font-size:10px;color:var(--txt3);margin-top:6px;font-style:italic}
.adv-team{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
.at-l{display:flex;align-items:center;gap:10px}
.at-flag{font-size:22px}.at-name{font-size:18px;font-weight:800}
.at-sub{font-size:9px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase}
.at-pct{font-size:28px;font-weight:800}
.advbar{width:100%;height:5px;background:#060e08;border-radius:2px;overflow:hidden}
.advfill{height:100%;border-radius:2px}
.pk-note{font-size:11px;color:var(--txt3);margin-top:12px;font-family:var(--mono)}
.pk-note span{color:var(--teal)}
.ev-spot{padding:16px 20px;background:var(--card3);border-top:2px solid var(--gold)}
.ev-spot-hdr{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);margin-bottom:12px}
.ev-tbl{width:100%;border-collapse:collapse}
.ev-tbl th{padding:6px 10px;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);border-bottom:2px solid var(--bord2);text-align:left}
.ev-tbl th.r{text-align:right}
.ev-tbl td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--bord)}
.ev-tbl td.r{text-align:right;font-family:var(--mono);font-size:12px}
.ev-tbl tr.bet-row td{background:#061408}
.ev-tbl td.match{font-weight:700}.ev-tbl td.outcome{color:var(--txt2)}
.empty-row{color:var(--txt3);padding:16px;text-align:center}
.ev-note{font-size:10px;color:var(--txt3);margin-top:8px}
.rank-tbl{width:100%;border-collapse:collapse}
.rank-tbl th{padding:9px 12px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);border-bottom:2px solid var(--bord2);text-align:left;background:var(--card)}
.rank-tbl th.r{text-align:right}
.rank-tbl td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--bord)}
.rank-tbl tr:hover td{background:var(--card2)}
.rank-tbl td.r{text-align:right;font-family:var(--mono);font-size:12px}
.team-cell{font-weight:700;font-size:14px}
.mini-warn{font-size:10px;font-family:var(--mono)}
.bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px}
.bcard{background:var(--card);border:1px solid var(--bord);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.bcard:hover{border-color:var(--gold)}
.bcard-hdr{background:var(--card3);padding:9px 14px;border-bottom:1px solid var(--bord);display:flex;justify-content:space-between}
.bcard-stage{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);font-weight:600}
.bcard-time{font-family:var(--mono);font-size:10px;color:var(--gold)}
.bteams{display:grid;grid-template-columns:1fr 28px 1fr;gap:4px;align-items:center;padding:12px 14px}
.bt{font-size:16px;font-weight:700}.bt.r{text-align:right}
.bvs{text-align:center;font-size:10px;color:var(--txt3);font-weight:600}
.bprobs{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 14px 10px}
.bph{background:#1a1000;color:var(--gold);text-align:center;padding:6px;border-radius:2px;font-family:var(--mono);font-size:11px}
.bpa{background:#001030;color:var(--blue);text-align:center;padding:6px;border-radius:2px;font-family:var(--mono);font-size:11px}
.bxg{font-size:9px;opacity:.7}
.blines{display:flex;justify-content:space-between;padding:6px 14px 10px;font-family:var(--mono);font-size:10px;color:var(--txt3)}
.badv{padding:0 14px 10px;display:flex;justify-content:space-between;font-size:11px;color:var(--txt3)}
.bet-tag{color:var(--green);font-weight:700;font-family:var(--mono)}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;padding:16px}
.tcard{background:var(--card);border:1px solid var(--bord);border-radius:4px;padding:12px 14px;position:relative}
.tc-name{font-size:17px;font-weight:800;margin-bottom:8px}
.tc-flag{font-size:28px;position:absolute;top:8px;right:12px}
.tc-mle{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-family:var(--mono);font-size:10px;color:var(--txt3)}
.tc-val{font-size:13px;font-weight:500;color:var(--txt)}
.tc-warn{max-width:100%;text-align:left;margin-top:8px}


.div-row td{background:#0a1a10!important;color:var(--gold2);font-size:10px;font-weight:800;letter-spacing:1.5px;padding:8px 10px!important;border-top:2px solid var(--bord2);border-bottom:1px solid var(--bord2)}
.ev-builder-tbl{width:100%;border-collapse:collapse}
.ev-builder-tbl th{padding:7px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);background:var(--card3);border-bottom:1px solid var(--bord);text-align:left;font-family:var(--mono)}
.ev-builder-tbl th.r{text-align:right}
.ev-builder-tbl td{padding:7px 10px;font-size:12px;border-bottom:1px solid #0f2012;vertical-align:middle}
.ev-builder-tbl td.mkt{color:var(--txt2);font-weight:600;font-size:11px}
.ev-builder-tbl td.out{font-weight:700;font-size:13px}
.ev-builder-tbl td.pct{font-family:var(--mono);font-size:11px}
.ev-builder-tbl td.fo{font-family:var(--mono);font-size:11px;text-align:right;font-weight:600}
.ev-builder-tbl td.r{text-align:right;font-family:var(--mono);font-size:11px}
.ev-builder-tbl tr.ev-row-bet td{background:#061408}
.ev-builder-tbl tr:hover td{background:#0d1e10}
.odds-input-cell{padding:4px 8px!important}

.kalshi-inp{width:50px;background:#0a1808;border:1px solid #2a5a3a;border-radius:3px;color:var(--teal);font-family:var(--mono);font-size:12px;padding:5px 6px;text-align:center;outline:none}
.kalshi-inp:focus{border-color:var(--teal)}
.kalshi-inp::placeholder{color:#3a6a4a}
.book-odds-inp{width:70px;background:#060e08;border:1px solid var(--bord2);border-radius:3px;color:var(--gold2);font-family:var(--mono);font-size:12px;padding:5px 7px;text-align:center;outline:none}
.book-odds-inp:focus{border-color:var(--gold)}
.book-odds-inp::placeholder{color:var(--txt3)}
.ev-imp{color:var(--txt3)}
.ev-builder-summary{font-size:10px;color:var(--txt3);padding:8px 10px;background:var(--card);font-style:italic}

.tracker-wrap{padding:16px 20px}
.tr-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.tr-stat{background:var(--card);border:1px solid var(--bord);border-radius:4px;padding:14px;text-align:center}
.tr-stat-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:5px}
.tr-stat-val{font-size:26px;font-weight:800}
.tr-stat-sub{font-size:9px;color:var(--txt3);margin-top:3px;font-family:var(--mono)}
.tr-add-panel{background:var(--card);border:1px solid var(--bord);border-radius:4px;padding:14px 16px;margin-bottom:14px}
.tr-add-hdr{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);font-weight:700;margin-bottom:12px}
.tr-add-grid{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr auto;gap:10px;align-items:end}
.tr-fg label{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px}
.tr-fg input{width:100%;background:#060e08;border:1px solid var(--bord2);border-radius:3px;color:var(--txt);font-family:var(--mono);font-size:13px;padding:7px 9px;outline:none}
.tr-fg input:focus{border-color:var(--gold)}
.cbtn-tr{background:var(--gold);color:#000;border:none;border-radius:3px;padding:8px 16px;font-weight:800;font-size:12px;letter-spacing:1px;cursor:pointer;white-space:nowrap}
.cbtn-tr:hover{opacity:.85}
.tr-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tr-action-btn{background:var(--card3);border:1px solid var(--bord2);color:var(--txt2);border-radius:3px;padding:7px 14px;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;text-transform:uppercase}
.tr-action-btn:hover{border-color:var(--teal);color:var(--teal)}
.tr-file-btn{display:inline-block;text-align:center}
.tr-danger:hover{border-color:var(--red);color:var(--red)}
.tr-tbl{width:100%;border-collapse:collapse}
.tr-tbl th{padding:7px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);background:var(--card3);border-bottom:1px solid var(--bord);text-align:left;font-family:var(--mono)}
.tr-tbl th.r{text-align:right}
.tr-tbl td{padding:7px 10px;font-size:12px;border-bottom:1px solid #0f2012;vertical-align:middle}
.tr-tbl td.r{text-align:right;font-family:var(--mono)}
.tr-tbl tr:hover td{background:#0d1e10}
.tr-status-sel{background:#060e08;border:1px solid var(--bord2);border-radius:3px;color:var(--txt);font-family:var(--body);font-size:11px;padding:4px 6px;outline:none}
.tr-status-sel.win{color:var(--green)}.tr-status-sel.loss{color:var(--red)}.tr-status-sel.push{color:var(--amber)}.tr-status-sel.pending{color:var(--txt3)}

<script>
/*
  Secondary model loader — fetches the recency-weighted comparison model
  (data_v2.js) at runtime rather than a second <script src> tag, since both
  files declare "var D={...}" and a second script tag would silently
  clobber the primary model. D2 starts null; the play-classifier gates
  degrade gracefully (treat missing D2 as "can't confirm agreement" rather
  than crashing) until it loads, then everything re-renders once it's in.
*/
var D2 = null;
function loadD2(){
  return fetch('data/data_v2.js?v=1').then(function(r){ return r.text(); }).then(function(txt){
    var m = txt.match(/var D=(\{[\s\S]*\});?\s*$/);
    if(m){ D2 = JSON.parse(m[1]); }
  }).catch(function(e){ console.warn('Recency-weighted comparison model unavailable:', e); });
}

/*
  Play classifier — the gate system, ported from play_classifier.py.
  Built from a real week's results, not designed in the abstract: the
  biggest single-number edge of the week (Morocco ML, +19.8pp, both
  models agreeing) lost clean. The smaller, cross-confirmed totals edges
  (Spain-Belgium, Argentina-Switzerland Over 2.5) won. This encodes that
  as gates a play must clear ALL of, not one edge threshold.
*/
var CLASSIFY_MIN_EDGE = 5.0;
var CLASSIFY_EDGE_CEILING = 15.0;
var CLASSIFY_MAX_SPREAD = 10.0;
var CLASSIFY_MAX_DATA_AGE_H = 36.0;

function classifyPlay(opts){
  // opts: { prodEdgePp, recencyEdgePp (nullable if D2 not loaded),
  //         isTotals, neighborEdgesPp (array), dataAgeHours }
  var gates = {};
  var prod = opts.prodEdgePp, rec = opts.recencyEdgePp;
  var haveBoth = (rec !== null && rec !== undefined && !isNaN(rec));

  // gate 1: min edge (on the smaller of the two, or prod alone if D2 not loaded)
  if(!haveBoth){
    gates.min_edge = {passed: Math.abs(prod)>=CLASSIFY_MIN_EDGE, reason: 'Recency model not loaded yet -- checked against production only'};
  } else {
    var sameSign = (prod>=0)===(rec>=0);
    var smaller = Math.min(Math.abs(prod),Math.abs(rec));
    if(!sameSign) gates.min_edge = {passed:false, reason:'Models disagree on direction -- treated as 0 edge'};
    else gates.min_edge = {passed: smaller>=CLASSIFY_MIN_EDGE, reason: smaller.toFixed(1)+'pp on the smaller side vs '+CLASSIFY_MIN_EDGE+'pp floor'};
  }

  // gate 2: model agreement
  if(!haveBoth){
    gates.model_agreement = {passed:true, reason:'Recency model not loaded -- cannot check agreement yet'};
  } else {
    var sameSign2 = (prod>=0)===(rec>=0);
    if(!sameSign2) gates.model_agreement = {passed:false, reason:'Production and recency-weighted models disagree on direction'};
    else {
      var spread = Math.abs(prod-rec);
      gates.model_agreement = {passed: spread<=CLASSIFY_MAX_SPREAD, reason: spread.toFixed(1)+'pp spread between models'};
    }
  }

  // gate 3: signal consistency (totals only)
  if(!opts.isTotals){
    gates.signal_consistency = {passed:true, reason:'Not a totals market'};
  } else if(!opts.neighborEdgesPp || opts.neighborEdgesPp.length===0){
    gates.signal_consistency = {passed:false, reason:'No neighboring-line data entered to confirm this isn\'t a one-line quirk'};
  } else {
    var agree = opts.neighborEdgesPp.filter(function(e){ return (e>=0)===(prod>=0); }).length;
    var frac = agree/opts.neighborEdgesPp.length;
    gates.signal_consistency = {passed: frac>=0.5, reason: agree+'/'+opts.neighborEdgesPp.length+' neighboring lines agree in direction'};
  }

  // gate 4: fresh data
  gates.fresh_data = {passed: opts.dataAgeHours<=CLASSIFY_MAX_DATA_AGE_H, reason: opts.dataAgeHours.toFixed(0)+'h old vs '+CLASSIFY_MAX_DATA_AGE_H+'h limit'};

  // gate 5: edge ceiling
  var smallerForCeiling = haveBoth ? Math.min(Math.abs(prod),Math.abs(rec)) : Math.abs(prod);
  gates.edge_ceiling = {passed: smallerForCeiling<=CLASSIFY_EDGE_CEILING, reason: smallerForCeiling.toFixed(1)+'pp vs '+CLASSIFY_EDGE_CEILING+'pp auto-publish ceiling'};

  var corePassed = gates.min_edge.passed && gates.model_agreement.passed && gates.fresh_data.passed;
  var displayEdge = haveBoth ? Math.min(Math.abs(prod),Math.abs(rec)) : Math.abs(prod);
  if(haveBoth && (prod<0)!==(rec<0)) displayEdge = 0;

  var tier, tierClass;
  if(!corePassed){
    tier = (gates.min_edge.passed || gates.model_agreement.passed) ? 'Watch' : 'No Bet';
    tierClass = tier==='Watch' ? 'tier-watch' : 'tier-nobet';
  } else if(!gates.edge_ceiling.passed){
    tier='Watch'; tierClass='tier-watch';
  } else if(opts.isTotals && !gates.signal_consistency.passed){
    tier='Lean'; tierClass='tier-lean';
  } else if(displayEdge>=10){
    tier='Elite Edge'; tierClass='tier-elite';
  } else if(displayEdge>=7){
    tier='Strong Play'; tierClass='tier-strong';
  } else {
    tier='Lean'; tierClass='tier-lean';
  }

  return {tier:tier, tierClass:tierClass, gates:gates, displayEdge:displayEdge};
}
</script>
<script>var RHO=-0.06, MAX_G=9;
var FLAGS_MAP={"Spain":"\uD83C\uDDEA\uD83C\uDDF8","Argentina":"\uD83C\uDDE6\uD83C\uDDF7","France":"\uD83C\uDDEB\uD83C\uDDF7","England":"ENG","Brazil":"\uD83C\uDDE7\uD83C\uDDF7","Colombia":"\uD83C\uDDE8\uD83C\uDDF4","Switzerland":"\uD83C\uDDE8\uD83C\uDDED","Norway":"\uD83C\uDDF3\uD83C\uDDF4","Portugal":"\uD83C\uDDF5\uD83C\uDDF9","Morocco":"\uD83C\uDDF2\uD83C\uDDE6","Belgium":"\uD83C\uDDE7\uD83C\uDDEA","Mexico":"\uD83C\uDDF2\uD83C\uDDFD","Canada":"\uD83C\uDDE8\uD83C\uDDE6","USA":"\uD83C\uDDFA\uD83C\uDDF8","Paraguay":"\uD83C\uDDF5\uD83C\uDDFE","Australia":"\uD83C\uDDE6\uD83C\uDDFA","Egypt":"\uD83C\uDDEA\uD83C\uDDEC","Ghana":"\uD83C\uDDEC\uD83C\uDDED","Cabo Verde":"\uD83C\uDDE8\uD83C\uDDFB"};
var TEAMS_LIST=["Spain","Argentina","France","England","Colombia","Switzerland","Norway","Portugal","Morocco","Belgium","Mexico","USA","Paraguay","Australia","Egypt","Ghana","Cabo Verde"];

var S = { home:"Portugal", away:"Spain", odds:{} };

function poi(k,lam){if(k<0||lam<=0)return 0;var l=-lam+k*Math.log(lam);for(var i=1;i<=k;i++)l-=Math.log(i);return Math.exp(l);}
function dcC(i,j,la,lb){if(i===0&&j===0)return 1-la*lb*RHO;if(i===1&&j===0)return 1+lb*RHO;if(i===0&&j===1)return 1+la*RHO;if(i===1&&j===1)return 1-RHO;return 1;}
function buildMat(la,lb){var m=[],t=0,i,j,v;for(i=0;i<=MAX_G;i++){m.push([]);for(j=0;j<=MAX_G;j++){v=poi(i,la)*poi(j,lb)*dcC(i,j,la,lb);m[i].push(v);t+=v;}}for(i=0;i<=MAX_G;i++)for(j=0;j<=MAX_G;j++)m[i][j]/=t;return m;}

function getMLE(t,DS){
  DS=DS||D;
  var m=DS.mle_shrunk[t];
  if(!m) return {attack:1.0,defense:1.0,matches:0,raw_attack:1.0,raw_defense:1.0};
  return m;
}

function calcMatch(hk,ak,DS){
  DS=DS||D;
  var h=getMLE(hk,DS),a=getMLE(ak,DS);
  var sfH=DS.squad_adjustments[hk],sfA=DS.squad_adjustments[ak];
  var hAdj=(sfH&&sfH.atk_mult)||1, aAdj=(sfA&&sfA.atk_mult)||1;
  var BXG=(DS.baseline_xg||1.2772); var la=h.attack*hAdj*a.defense*BXG, lb=a.attack*aAdj*h.defense*BXG;
  var mat=buildMat(la,lb);
  var pw=0,pd=0,pl=0,pm2h=0,pm2a=0,o25=0,o35=0,btts=0,bestP=0,bI=1,bJ=0,i,j,v;
  for(i=0;i<=MAX_G;i++)for(j=0;j<=MAX_G;j++){
    v=mat[i][j];
    if(i>j)pw+=v;else if(i===j)pd+=v;else pl+=v;
    if(i-j>=2)pm2h+=v;if(j-i>=2)pm2a+=v;
    if(i+j>2.5)o25+=v;if(i+j>3.5)o35+=v;
    if(i>0&&j>0)btts+=v;
    if(v>bestP){bestP=v;bI=i;bJ=j;}
  }
  // Calibration correction: walk-forward backtest (94 tournament matches,
  // true out-of-sample, refit before each match date) showed the raw model
  // is systematically UNDERCONFIDENT on favorites (e.g. "60% favorite" wins
  // ~70-78% of the time in practice). Platt-scaled on that same backtest;
  // improved mean Brier from 0.4976 to 0.4940. Applies only to match-result
  // (W/D/L) probabilities, not totals/BTTS/corners/shots, which were not
  // part of this calibration test.
  if(DS.calibration){
    var CA=DS.calibration.a, CB=DS.calibration.b;
    var rw=1/(1+Math.exp(-(CA+CB*Math.log(pw/(1-pw)))));
    var rd=1/(1+Math.exp(-(CA+CB*Math.log(pd/(1-pd)))));
    var rl=1/(1+Math.exp(-(CA+CB*Math.log(pl/(1-pl)))));
    var rs=rw+rd+rl;
    pw=rw/rs; pd=rd/rs; pl=rl/rs;
  }
  var crH=DS.corner_ratings[hk],crA=DS.corner_ratings[ak];
  var cLa,cLb;
  if(crH&&crA){
    cLa=DS.corner_league_avg_for*crH.attack*crA.defense;
    cLb=DS.corner_league_avg_for*crA.attack*crH.defense;
  } else {
    cLa=4.8*la; cLb=4.8*lb;
  }
  var srH=DS.shots_ratings[hk],srA=DS.shots_ratings[ak];
  var sLa,sLb;
  if(srH&&srA){
    sLa=DS.shots_league_avg_for*srH.attack*srA.defense;
    sLb=DS.shots_league_avg_for*srA.attack*srH.defense;
  } else {
    sLa=la/0.105; sLb=lb/0.105;
  }
  var mcH=0,mcT=0,mcA=0;
  for(i=0;i<=22;i++)for(j=0;j<=22;j++){v=poi(i,cLa)*poi(j,cLb);if(i>j)mcH+=v;else if(i===j)mcT+=v;else mcA+=v;}
  var cTot=cLa+cLb,cThr=Math.round(cTot)-0.5,cOver=0;
  for(i=0;i<=45;i++)if(i>cThr)cOver+=poi(i,cTot);
  var sTot=sLa+sLb,sThr=Math.round(sTot)-0.5,sOver=0;
  for(i=0;i<=70;i++)if(i>sThr)sOver+=poi(i,sTot);
  var pkH=DS.pk_rates_v4[hk]||0.5,pkA=DS.pk_rates_v4[ak]||0.5;
  var pkHn=pkH/(pkH+pkA),pkAn=pkA/(pkH+pkA);
  var fcH=DS.finisher_concentration[hk],fcA=DS.finisher_concentration[ak];
  var marginalH=[],marginalA=[];
  for(i=0;i<=MAX_G;i++){
    var sh=0,sa=0;
    for(j=0;j<=MAX_G;j++){sh+=mat[i][j];sa+=mat[j][i];}
    marginalH.push(sh);marginalA.push(sa);
  }
  return {la:la,lb:lb,pw:pw,pd:pd,pl:pl,pm2h:pm2h,pm2a:pm2a,o25:o25,o35:o35,btts:btts,
    bI:bI,bJ:bJ,mat:mat,cLa:cLa,cLb:cLb,sLa:sLa,sLb:sLb,mcH:mcH,mcT:mcT,mcA:mcA,
    cThr:cThr,cOver:cOver,sThr:sThr,sOver:sOver,
    advH:pw+pd*pkHn,advA:pl+pd*pkAn,pkH:pkH,pkA:pkA,
    hAdj:hAdj,aAdj:aAdj,hMLE:h,aMLE:a,fcH:fcH,fcA:fcA,
    marginalH:marginalH,marginalA:marginalA};
}

function pToAm(p){if(p<=0.001||p>=0.999)return "\u2014";return p>=0.5?("-"+Math.round(p/(1-p)*100)):("+"+Math.round((1-p)/p*100));}
function amToP(o){if(o===null||isNaN(o))return null;return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100);}
function evCalc(mP,odds){var d=odds>0?odds/100+1:100/Math.abs(odds)+1;return mP*(d-1)*100-(1-mP)*100;}
function neg(s){return s&&s.charAt(0)==="-";}
function fmtOdds(o){if(o===null||o===undefined||isNaN(o))return "\u2014";return (o>0?"+":"")+o;}

function showTab(name,el){
  var secs=document.querySelectorAll(".sec"),tabs=document.querySelectorAll(".nav-tab"),i;
  for(i=0;i<secs.length;i++)secs[i].classList.remove("on");
  for(i=0;i<tabs.length;i++)tabs[i].classList.remove("on");
  document.getElementById("tab-"+name).classList.add("on");
  el.classList.add("on");
}

function loadMatch(hk,ak){
  S.home=hk;S.away=ak;
  S.odds={};
  var lk=hk+"_vs_"+ak,lkr=ak+"_vs_"+hk;
  var L=D.dk_lines[lk],Lr=D.dk_lines[lkr];
  if(L){
    S.odds.ml_h=L.ml_h;S.odds.ml_d=L.ml_d;S.odds.ml_a=L.ml_a;
    if(L.adv_h!==undefined)S.odds.adv_h=L.adv_h;
    if(L.adv_a!==undefined)S.odds.adv_a=L.adv_a;
  } else if(Lr){
    S.odds.ml_h=Lr.ml_a;S.odds.ml_d=Lr.ml_d;S.odds.ml_a=Lr.ml_h;
    if(Lr.adv_a!==undefined)S.odds.adv_h=Lr.adv_a;
    if(Lr.adv_h!==undefined)S.odds.adv_a=Lr.adv_h;
  }
  document.getElementById("sel-h").value=hk;
  document.getElementById("sel-a").value=ak;
  render();
}
function onSelChange(){loadMatch(document.getElementById("sel-h").value, document.getElementById("sel-a").value);}
function onOddsInput(which,val){
  var v=parseFloat(val);
  if(which==="h")S.mlH=isNaN(v)?null:v;
  if(which==="d")S.mlD=isNaN(v)?null:v;
  if(which==="a")S.mlA=isNaN(v)?null:v;
  renderVF();renderEVSpot();
}

function oddsRowsHTML(C,hk,ak){
  function oRow(mkt,out,p,first){
    var am=pToAm(p);
    return "<tr><td class='mkt'>"+(first?mkt:"")+"</td><td class='out'>"+out+"</td><td class='pct'>"+(p*100).toFixed(1)+"%</td><td class='fo "+(neg(am)?"fo-neg":"fo-pos")+"'>"+am+"</td></tr>";
  }
  var sep="<tr class='sep'><td colspan='4'></td></tr>",html="";
  html+=oRow("Match result",hk+" win",C.pw,true)+oRow("","Draw",C.pd,false)+oRow("",ak+" win",C.pl,false)+sep;
  html+=oRow("Total goals O/U 2.5","Over 2.5",C.o25,true)+oRow("","Under 2.5",1-C.o25,false)+sep;
  html+=oRow("Total goals O/U 3.5","Over 3.5",C.o35,true)+oRow("","Under 3.5",1-C.o35,false)+sep;
  html+=oRow("Both teams to score","Yes",C.btts,true)+oRow("","No",1-C.btts,false)+sep;

function totalOverProb(mat,thr){
  var p=0,i,j;
  for(i=0;i<mat.length;i++)for(j=0;j<mat[i].length;j++)if(i+j>thr)p+=mat[i][j];
  return p;
}
function marginalOverProb(marginal,thr){
  var p=0,i;
  for(i=0;i<marginal.length;i++)if(i>thr)p+=marginal[i];
  return p;
}
function marginOverProb(mat,thr,dir){
  // dir=1: home margin (i-j)>thr ; dir=-1: away margin (j-i)>thr
  var p=0,i,j;
  for(i=0;i<mat.length;i++)for(j=0;j<mat[i].length;j++){
    var m=dir===1?(i-j):(j-i);
    if(m>thr)p+=mat[i][j];
  }
  return p;
}
function poiOverProb(lam,thr,maxK){
  var p=0,k;
  for(k=0;k<=maxK;k++)if(k>thr)p+=poi(k,lam);
  return p;
}

function marketRows(C,hk,ak){
  var rows=[];
  rows.push({id:"ml_h",grp:"Match Result",first:true,label:hk+" win",p:C.pw});
  rows.push({id:"ml_d",grp:"",first:false,label:"Draw",p:C.pd});
  rows.push({id:"ml_a",grp:"",first:false,label:ak+" win",p:C.pl});

  rows.push({div:true,label:"TO QUALIFY (ADVANCE) \u2014 90 MIN + ET + PENS"});
  rows.push({id:"adv_h",grp:hk+" To Qualify",first:true,label:hk+" advances",p:C.advH});
  rows.push({id:"adv_a",grp:ak+" To Qualify",first:true,label:ak+" advances",p:C.advA});

  rows.push({div:true,label:"TOTAL MATCH GOALS \u2014 ALL LINES"});
  var goalLines=[0.5,1.5,2.5,3.5,4.5,5.5];
  for(var gi=0;gi<goalLines.length;gi++){
    var gl=goalLines[gi];
    var op=totalOverProb(C.mat,gl);
    rows.push({id:"g_o"+gl,grp:gi===0?"Total Goals":"",first:gi===0,label:"Over "+gl,p:op});
    rows.push({id:"g_u"+gl,grp:"",first:false,label:"Under "+gl,p:1-op});
  }

  rows.push({div:true,label:hk.toUpperCase()+" TEAM TOTAL GOALS"});
  var htLines=[0.5,1.5,2.5];
  for(var hi=0;hi<htLines.length;hi++){
    var hl=htLines[hi];
    var hp=marginalOverProb(C.marginalH,hl);
    rows.push({id:"ht_o"+hl,grp:hi===0?hk+" Team Total":"",first:hi===0,label:"Over "+hl,p:hp});
    rows.push({id:"ht_u"+hl,grp:"",first:false,label:"Under "+hl,p:1-hp});
  }

  rows.push({div:true,label:ak.toUpperCase()+" TEAM TOTAL GOALS"});
  for(var ai=0;ai<htLines.length;ai++){
    var al=htLines[ai];
    var ap=marginalOverProb(C.marginalA,al);
    rows.push({id:"at_o"+al,grp:ai===0?ak+" Team Total":"",first:ai===0,label:"Over "+al,p:ap});
    rows.push({id:"at_u"+al,grp:"",first:false,label:"Under "+al,p:1-ap});
  }

  rows.push({div:true,label:"BOTH TEAMS TO SCORE"});
  rows.push({id:"btts_y",grp:"BTTS",first:true,label:"Yes",p:C.btts});
  rows.push({id:"btts_n",grp:"",first:false,label:"No",p:1-C.btts});

  rows.push({div:true,label:"ALTERNATE HANDICAPS \u2014 "+hk.toUpperCase()});
  var hcLines=[0.5,1.5,2.5,3.5];
  for(var hci=0;hci<hcLines.length;hci++){
    var hcl=hcLines[hci];
    var hcp=marginOverProb(C.mat,hcl,1);
    rows.push({id:"hc_h"+hcl,grp:hci===0?hk+" Handicap":"",first:hci===0,label:hk+" -"+hcl,p:hcp});
  }

  rows.push({div:true,label:"ALTERNATE HANDICAPS \u2014 "+ak.toUpperCase()});
  for(var aci=0;aci<hcLines.length;aci++){
    var acl=hcLines[aci];
    var acp=marginOverProb(C.mat,acl,-1);
    rows.push({id:"hc_a"+acl,grp:aci===0?ak+" Handicap":"",first:aci===0,label:ak+" -"+acl,p:acp});
  }

  rows.push({div:true,label:"TOTAL CORNERS \u2014 ALTERNATE LINES"});
  var cTotal=C.cLa+C.cLb;
  var cBase=Math.round(cTotal)-2.5;
  for(var ci=0;ci<6;ci++){
    var cl=cBase+ci;
    if(cl<1)continue;
    var cp=poiOverProb(cTotal,cl,50);
    rows.push({id:"corn_o"+cl,grp:ci===0?"Total Corners":"",first:ci===0,label:"Over "+cl,p:cp});
    rows.push({id:"corn_u"+cl,grp:"",first:false,label:"Under "+cl,p:1-cp});
  }

  rows.push({div:true,label:hk.toUpperCase()+" TEAM CORNERS \u2014 ALTERNATE LINES"});
  var hcBase=Math.round(C.cLa)-2.5;
  for(var hci2=0;hci2<5;hci2++){
    var hcl2=hcBase+hci2;
    if(hcl2<0.5)continue;
    var hcp2=poiOverProb(C.cLa,hcl2,40);
    rows.push({id:"hcorn_o"+hcl2,grp:hci2===0?hk+" Corners":"",first:hci2===0,label:"Over "+hcl2,p:hcp2});
    rows.push({id:"hcorn_u"+hcl2,grp:"",first:false,label:"Under "+hcl2,p:1-hcp2});
  }

  rows.push({div:true,label:ak.toUpperCase()+" TEAM CORNERS \u2014 ALTERNATE LINES"});
  var acBase=Math.round(C.cLb)-2.5;
  for(var aci2=0;aci2<5;aci2++){
    var acl2=acBase+aci2;
    if(acl2<0.5)continue;
    var acp2=poiOverProb(C.cLb,acl2,40);
    rows.push({id:"acorn_o"+acl2,grp:aci2===0?ak+" Corners":"",first:aci2===0,label:"Over "+acl2,p:acp2});
    rows.push({id:"acorn_u"+acl2,grp:"",first:false,label:"Under "+acl2,p:1-acp2});
  }

  rows.push({div:true,label:"MOST CORNERS"});
  rows.push({id:"mc_h",grp:"Most Corners",first:true,label:hk,p:C.mcH});
  rows.push({id:"mc_t",grp:"",first:false,label:"Tie",p:C.mcT});
  rows.push({id:"mc_a",grp:"",first:false,label:ak,p:C.mcA});

  rows.push({div:true,label:"TOTAL SHOTS \u2014 ALTERNATE LINES"});
  var sTotal=C.sLa+C.sLb;
  var sBase=Math.round(sTotal/2)*2-4;
  for(var si=0;si<5;si++){
    var sl=sBase+si*2+0.5;
    if(sl<5)continue;
    var sp=poiOverProb(sTotal,sl,80);
    rows.push({id:"shot_o"+sl,grp:si===0?"Total Shots":"",first:si===0,label:"Over "+sl,p:sp});
    rows.push({id:"shot_u"+sl,grp:"",first:false,label:"Under "+sl,p:1-sp});
  }

  rows.push({div:true,label:"DOUBLE CHANCE"});
  rows.push({id:"dc_h",grp:"Double Chance",first:true,label:hk+" or Draw",p:C.pw+C.pd});
  rows.push({id:"dc_a",grp:"",first:false,label:ak+" or Draw",p:C.pl+C.pd});
  rows.push({id:"dc_x",grp:"",first:false,label:hk+" or "+ak+" (no draw)",p:C.pw+C.pl});

  return rows;
}

function centsToAmerican(cents){
  var p=cents/100;
  if(p<=0||p>=1)return null;
  return p>=0.5?-Math.round(p/(1-p)*100):Math.round((1-p)/p*100);
}
function onKalshiInput(id,val){
  var cents=parseFloat(val);
  if(isNaN(cents)||cents<=0||cents>=100)return;
  var am=centsToAmerican(cents);
  if(am!==null)onBookOdds(id,am);
}
function onBookOdds(id,val){
  var v=parseFloat(val);
  S.odds[id]=isNaN(v)?null:v;
  renderEVBuilder();
}

function evBuilderHTML(C,hk,ak){
  var rows=marketRows(C,hk,ak);

  // recency-weighted comparison, if D2 has loaded
  var rows2map={};
  if(D2){
    var C2=calcMatch(hk,ak,D2);
    var rows2=marketRows(C2,hk,ak);
    for(var ri=0;ri<rows2.length;ri++){ if(!rows2[ri].div) rows2map[rows2[ri].id]=rows2[ri].p; }
  }

  // data freshness, from the production model's own refit timestamp
  var dataAgeHours=0;
  if(D.last_updated){
    dataAgeHours=(Date.now()-new Date(D.last_updated).getTime())/3600000;
  }

  var body="",i,filledCount=0,totalPriceable=0;
  for(i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.div){
      body+="<tr class='div-row'><td colspan='10'>"+r.label+"</td></tr>";
      continue;
    }
    totalPriceable++;
    var fair=pToAm(r.p);
    var bookVal=S.odds[r.id];
    var hasBook=(bookVal!==null&&bookVal!==undefined&&!isNaN(bookVal));
    var impCell="\u2014",edgeCell="\u2014",evCell="\u2014",sigCell="",tierCell="\u2014";
    if(hasBook){
      filledCount++;
      var imp=amToP(bookVal),edge=r.p-imp,ev=evCalc(r.p,bookVal);
      impCell="<span class='ev-imp'>"+(imp*100).toFixed(1)+"%</span>";
      edgeCell="<span class='"+(edge>=0?'edge-pos':'edge-neg')+"'>"+(edge>=0?'+':'')+(edge*100).toFixed(1)+"pp</span>";
      evCell="<span class='"+(ev>=0?'ev-pos':'ev-neg')+"'>"+(ev>=0?'+$':'\u2212$')+Math.abs(ev).toFixed(2)+"</span>";
      var logBtn="<button class='tr-log-btn' onclick='logFromBuilder(\""+r.grp.replace(/"/g,"")+" "+r.label.replace(/"/g,"")+"\",\""+hk+"\",\""+ak+"\","+bookVal+","+r.p+")'>\u2192 Log</button>";
      if(edge>=0.05)sigCell="<span class='sig-b'>BET</span>"+logBtn;
      else if(edge>=0.02)sigCell="<span class='sig-e'>EDGE</span>"+logBtn;
      else if(edge>=0)sigCell="<span class='sig-s'>SKIP</span>";
      else sigCell="<span class='sig-f'>FADE</span>";

      // ---- play classifier ----
      var prodEdgePp=edge*100;
      var recEdgePp=null;
      if(D2 && r.id in rows2map){
        var p2=rows2map[r.id];
        recEdgePp=(p2-imp)*100;
      }
      var isTotals = r.id.indexOf('g_o')===0 || r.id.indexOf('g_u')===0;
      var neighborEdges=[];
      if(isTotals){
        for(var rj=0;rj<rows.length;rj++){
          var r2=rows[rj];
          if(r2.div || r2.id===r.id) continue;
          if(r2.id.indexOf('g_o')!==0 && r2.id.indexOf('g_u')!==0) continue;
          var bv2=S.odds[r2.id];
          if(bv2===null||bv2===undefined||isNaN(bv2)) continue;
          var imp2=amToP(bv2);
          neighborEdges.push((r2.p-imp2)*100);
        }
      }
      var cls=classifyPlay({prodEdgePp:prodEdgePp, recencyEdgePp:recEdgePp, isTotals:isTotals, neighborEdgesPp:neighborEdges, dataAgeHours:dataAgeHours});
      var gateLines=[];
      for(var gname in cls.gates){ gateLines.push((cls.gates[gname].passed?'\u2713':'\u2717')+' '+gname+': '+cls.gates[gname].reason); }
      tierCell="<span class='"+cls.tierClass+" tier-cell' title=\""+gateLines.join('\n').replace(/"/g,'&quot;')+"\">"+cls.tier+"</span>";
    }
    var rowClass = hasBook ? (r.p-amToP(bookVal)>=0.05 ? "ev-row-bet" : "") : "";
    body+="<tr class='"+rowClass+"'>"
      +"<td class='mkt'>"+(r.first?r.grp:"")+"</td>"
      +"<td class='out'>"+r.label+"</td>"
      +"<td class='pct'>"+(r.p*100).toFixed(1)+"%</td>"
      +"<td class='fo "+(neg(fair)?'fo-neg':'fo-pos')+"'>"+fair+"</td>"
      +"<td class='odds-input-cell'><input type='number' class='book-odds-inp' value='"+(hasBook?bookVal:"")+"' placeholder='odds' oninput='onBookOdds(\""+r.id+"\",this.value)'></td>"
      +"<td class='odds-input-cell'><input type='number' class='kalshi-inp' placeholder='\u00A2' min='1' max='99' oninput='onKalshiInput(\""+r.id+"\",this.value)'></td>"
      +"<td class='r'>"+impCell+"</td>"
      +"<td class='r'>"+edgeCell+"</td>"
      +"<td class='r'>"+evCell+"</td>"
      +"<td>"+sigCell+"</td>"
      +"<td>"+tierCell+"</td>"
      +"</tr>";
  }
  var summary="";
  if(filledCount>0){
    summary="<div class='ev-builder-summary'>"+filledCount+" of "+totalPriceable+" markets priced \u2014 fill in book odds for any market to see edge instantly. Tier column hover shows which gates passed.</div>";
    if(!D2) summary+="<div class='ev-builder-summary' style='color:var(--amber)'>Recency-weighted comparison model still loading \u2014 Tier badges will refine once it's in.</div>";
  } else {
    summary="<div class='ev-builder-summary'>Enter book odds in any row to calculate edge &amp; EV for that market</div>";
  }
  return "<table class='ev-builder-tbl'><thead><tr>"
    +"<th>Market</th><th>Outcome</th><th>Model%</th><th class='r'>Fair</th><th>Book Odds</th><th>Kalshi \u00A2</th><th class='r'>Implied</th><th class='r'>Edge</th><th class='r'>EV/$100</th><th>Signal</th><th>Tier</th>"
    +"</tr></thead><tbody>"+body+"</tbody></table>"+summary;
}

function renderBracket(){
  var cont=document.getElementById("bracket-grid");
  if(!cont)return;
  var html="",k;
  for(k=0;k<D.r16.length;k++){
    var m=D.r16[k];
    var lk=m.home+"_vs_"+m.away,lkr=m.away+"_vs_"+m.home;
    var L=D.dk_lines[lk],Lr=D.dk_lines[lkr];
    var mlH=null,mlD=null,mlA=null,advH=null,advA=null;
    if(L){mlH=L.ml_h;mlD=L.ml_d;mlA=L.ml_a;advH=L.adv_h;advA=L.adv_a;}
    else if(Lr){mlH=Lr.ml_a;mlD=Lr.ml_d;mlA=Lr.ml_h;advH=Lr.adv_a;advA=Lr.adv_h;}
    var C2=calcMatch(m.home,m.away);
    if(!C2)continue;
    var edgeHTML="";
    if(advH!==null){
      var mktAdvH=amToP(advH);
      var edge=C2.advH-mktAdvH;
      var edgeTeam=edge>0?m.home:m.away;
      var edgeVal=Math.abs(edge);
      if(edgeVal>0.02){
        edgeHTML="<div class='badv'><span>Model edge: "+edgeTeam+"</span><span class='bet-tag'>"+(edge>0?"+":"\u2212")+(edgeVal*100).toFixed(1)+"pp</span></div>";
      }
    }
    html+="<div class='bcard' onclick='loadMatch(\""+m.home+"\",\""+m.away+"\");showTab(\"predict\",document.querySelectorAll(\".nav-tab\")[1])'>"
      +"<div class='bcard-hdr'><span class='bcard-stage'>ROUND OF 16</span><span class='bcard-time'>"+m.time+"</span></div>"

  var match=document.getElementById("tr-match").value.trim();
  var market=document.getElementById("tr-market").value.trim();
  var odds=parseFloat(document.getElementById("tr-odds").value);
  var modelP=parseFloat(document.getElementById("tr-modelp").value);
  var stake=parseFloat(document.getElementById("tr-stake").value)||100;
  if(!match||!market||isNaN(odds)||isNaN(modelP)){alert("Fill in match, market, odds, and model % first.");return;}
  addBet(match, market, odds, modelP/100, stake);
  document.getElementById("tr-match").value="";
  document.getElementById("tr-market").value="";
  document.getElementById("tr-odds").value="";
  document.getElementById("tr-modelp").value="";
}

  showTab("tracker", document.querySelectorAll(".nav-tab")[4]);

function updateBetStatus(id, status){
  var b=TRACKER.bets.find(function(x){return x.id===id;});
  if(b){b.status=status;renderTracker();}
}
function updateBetOdds(id, val){
  var b=TRACKER.bets.find(function(x){return x.id===id;});
  var v=parseFloat(val);
  if(b){b.odds=isNaN(v)?null:v;renderTracker();}
}
function updateBetClosing(id, val){
  var b=TRACKER.bets.find(function(x){return x.id===id;});
  var v=parseFloat(val);
  if(b){b.closingOdds=isNaN(v)?null:v;renderTracker();}
}
function removeBet(id){
  TRACKER.bets=TRACKER.bets.filter(function(x){return x.id!==id;});
  renderTracker();
}
function clearBets(){
  if(TRACKER.bets.length===0)return;
  if(confirm("Clear all "+TRACKER.bets.length+" logged bets? This cannot be undone (export first if you want a backup).")){
    TRACKER.bets=[];
    renderTracker();
  }
}

function exportBets(){
  var dataStr="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(TRACKER.bets,null,2));
  var a=document.createElement("a");
  a.setAttribute("href",dataStr);
  a.setAttribute("download","wc7_bet_log_"+new Date().toISOString().slice(0,10)+".json");
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function importBets(inputEl){
  var file=inputEl.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var parsed=JSON.parse(e.target.result);
      if(!Array.isArray(parsed))throw new Error("not an array");
      var maxId=0;
      parsed.forEach(function(b){if(b.id>maxId)maxId=b.id;});
      trIdCounter=maxId+1;
      TRACKER.bets=parsed;
      renderTracker();
      alert("Imported "+parsed.length+" bets.");
    }catch(err){alert("Could not parse file: "+err.message);}
  };
  reader.readAsText(file);
  inputEl.value="";
}

function betProfit(b){
  if(b.status==="pending")return null;
  if(b.status==="push")return 0;
  if(b.odds===null||b.odds===undefined||isNaN(b.odds))return null;
  var dec=amDecTr(b.odds);
  if(b.status==="win")return b.stake*(dec-1);
  return -b.stake;
}

function betCLV(b){
  if(b.closingOdds===null||b.closingOdds===undefined||isNaN(b.closingOdds))return null;
  if(b.odds===null||b.odds===undefined||isNaN(b.odds))return null;
  var decTaken=amDecTr(b.odds), decClose=amDecTr(b.closingOdds);
  return (decTaken/decClose - 1) * 100;
}

function computeStats(){
  var bets=TRACKER.bets;
  var settled=bets.filter(function(b){return b.status==="win"||b.status==="loss"||b.status==="push";});
  var wins=settled.filter(function(b){return b.status==="win";}).length;
  var losses=settled.filter(function(b){return b.status==="loss";}).length;
  var pushes=settled.filter(function(b){return b.status==="push";}).length;
  var decisive=wins+losses;
  var actualWinRate=decisive>0?wins/decisive:null;
  var avgModelP=decisive>0?settled.filter(function(b){return b.status!=="push";}).reduce(function(s,b){return s+b.modelP;},0)/decisive:null;
  // Only count staked/profit/ROI for bets that actually have odds entered
  var priced=settled.filter(function(b){return b.odds!==null&&b.odds!==undefined&&!isNaN(b.odds);});
  var totalStaked=priced.reduce(function(s,b){return s+b.stake;},0);
  var totalProfit=priced.reduce(function(s,b){var p=betProfit(b);return s+(p||0);},0);
  var roi=totalStaked>0?(totalProfit/totalStaked)*100:null;
  var withClosing=bets.filter(function(b){return betCLV(b)!==null;});
  var avgCLV=withClosing.length>0?withClosing.reduce(function(s,b){return s+betCLV(b);},0)/withClosing.length:null;
  var pending=bets.filter(function(b){return b.status==="pending";}).length;
  var awaitingOdds=bets.filter(function(b){return (b.odds===null||b.odds===undefined||isNaN(b.odds))&&b.status!=="pending";}).length;
  return {wins:wins,losses:losses,pushes:pushes,decisive:decisive,actualWinRate:actualWinRate,
          avgModelP:avgModelP,totalStaked:totalStaked,totalProfit:totalProfit,roi:roi,
          avgCLV:avgCLV,clvCount:withClosing.length,pending:pending,total:bets.length,
          priced:priced.length,awaitingOdds:awaitingOdds};
}

function renderSummary(){
  var s=computeStats();
  var el=document.getElementById("tr-summary");
  if(!el)return;
  function stat(lbl,val,sub,color){
    return "<div class='tr-stat'><div class='tr-stat-lbl'>"+lbl+"</div><div class='tr-stat-val' style='color:"+(color||"var(--txt)")+"'>"+val+"</div><div class='tr-stat-sub'>"+sub+"</div></div>";
  }
  var html="";
  html+=stat("Record", s.wins+"-"+s.losses+(s.pushes?"-"+s.pushes+"P":""), s.awaitingOdds+" awaiting odds", "var(--gold2)");
  html+=stat("Actual Win Rate", s.actualWinRate!==null?(s.actualWinRate*100).toFixed(1)+"%":"\u2014", s.decisive+" settled bets", s.actualWinRate!==null?"var(--teal)":"var(--txt3)");
  html+=stat("Avg Model Prob", s.avgModelP!==null?(s.avgModelP*100).toFixed(1)+"%":"\u2014", "calibration check", "var(--blue)");
  var calibDiff = (s.actualWinRate!==null && s.avgModelP!==null) ? (s.actualWinRate - s.avgModelP)*100 : null;
  html+=stat("Calibration", calibDiff!==null?(calibDiff>=0?"+":"")+calibDiff.toFixed(1)+"pp":"\u2014", calibDiff!==null?(Math.abs(calibDiff)<5?"well calibrated":Math.abs(calibDiff)<10?"watch closely":"miscalibrated"):"need more data", calibDiff!==null?(Math.abs(calibDiff)<5?"var(--green)":Math.abs(calibDiff)<10?"var(--amber)":"var(--red)"):"var(--txt3)");
  html+=stat("Total Staked", "$"+s.totalStaked.toFixed(0), s.priced+" priced bets", "var(--txt2)");
  html+=stat("Profit / Loss", (s.totalProfit>=0?"+$":"\u2212$")+Math.abs(s.totalProfit).toFixed(2), "net units", s.totalProfit>=0?"var(--green)":"var(--red)");
  html+=stat("ROI", s.roi!==null?(s.roi>=0?"+":"")+s.roi.toFixed(1)+"%":"\u2014", "on staked amount", s.roi!==null?(s.roi>=0?"var(--green)":"var(--red)"):"var(--txt3)");
  html+=stat("Avg CLV", s.avgCLV!==null?(s.avgCLV>=0?"+":"")+s.avgCLV.toFixed(1)+"%":"\u2014", s.clvCount+" w/ closing odds", s.avgCLV!==null?(s.avgCLV>=0?"var(--green)":"var(--red)"):"var(--txt3)");
  el.innerHTML=html;
}

function renderTrackerTable(){
  var el=document.getElementById("tr-table-wrap");
  if(!el)return;
  if(TRACKER.bets.length===0){
    el.innerHTML="<div class='tr-empty'>No bets logged yet. Add one above, or click \"\u2192 Log\" next to any +EV row in the Predict tab.</div>";
    return;
  }
  var rows="";
  TRACKER.bets.forEach(function(b){
    var hasOdds=(b.odds!==null&&b.odds!==undefined&&!isNaN(b.odds));
    var imp=hasOdds?amToPTr(b.odds):null;
    var edge=hasOdds?(b.modelP-imp):null;
    var clv=betCLV(b);
    var profit=betProfit(b);
    var statusClass=b.status;
    var rowFade=hasOdds?"":" style='opacity:.7'";
    rows+="<tr"+rowFade+">"
      +"<td class='muted mono' style='font-size:10px'>"+b.date+"</td>"
      +"<td style='font-weight:600'>"+b.match+"</td>"
      +"<td class='muted'>"+b.market+"</td>"
      +"<td><input type='number' class='tr-close-inp' placeholder='odds' value='"+(hasOdds?b.odds:"")+"' onchange='updateBetOdds("+b.id+",this.value)'></td>"
      +"<td class='r mono'>"+(hasOdds?(imp*100).toFixed(1)+"%":"\u2014")+"</td>"
      +"<td class='r mono' style='color:var(--blue)'>"+(b.modelP*100).toFixed(1)+"%</td>"
      +"<td class='r mono' style='color:"+(edge===null?"var(--txt3)":edge>=0?"var(--green)":"var(--red)")+"'>"+(edge===null?"\u2014":(edge>=0?"+":"")+(edge*100).toFixed(1)+"pp")+"</td>"
      +"<td class='r mono'>$"+b.stake.toFixed(0)+"</td>"
      +"<td><select class='tr-status-sel "+statusClass+"' onchange='updateBetStatus("+b.id+",this.value)'>"
      +"<option value='pending'"+(b.status==="pending"?" selected":"")+">Pending</option>"
      +"<option value='win'"+(b.status==="win"?" selected":"")+">Win</option>"
      +"<option value='loss'"+(b.status==="loss"?" selected":"")+">Loss</option>"
      +"<option value='push'"+(b.status==="push"?" selected":"")+">Push</option>"
      +"</select></td>"
      +"<td class='r mono' style='color:"+(profit===null?"var(--txt3)":profit>=0?"var(--green)":"var(--red)")+"'>"+(profit===null?(hasOdds?"\u2014":"<span style=\"color:var(--amber);font-size:10px\">need odds</span>"):(profit>=0?"+$":"\u2212$")+Math.abs(profit).toFixed(2))+"</td>"
      +"<td><input type='number' class='tr-close-inp' placeholder='close' value='"+(b.closingOdds!==null?b.closingOdds:"")+"' onchange='updateBetClosing("+b.id+",this.value)'></td>"
      +"<td class='r mono' style='color:"+(clv===null?"var(--txt3)":clv>=0?"var(--green)":"var(--red)")+"'>"+(clv===null?"\u2014":(clv>=0?"+":"")+clv.toFixed(1)+"%")+"</td>"
      +"<td><button class='tr-rm-btn' onclick='removeBet("+b.id+")'>\u2715</button></td>"
      +"</tr>";
  });
  el.innerHTML="<table class='tr-tbl'><thead><tr>"
    +"<th>Date</th><th>Match</th><th>Market</th><th>Odds (editable)</th><th class='r'>Impl%</th><th class='r'>Model%</th><th class='r'>Edge</th><th class='r'>Stake</th><th>Status</th><th class='r'>P/L</th><th>Closing</th><th class='r'>CLV</th><th></th>"
    +"</tr></thead><tbody>"+rows+"</tbody></table>";
}

function renderTracker(){
  renderSummary();
  renderTrackerTable();
}
